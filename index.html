<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Morning Diary Bot</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #333; }
        p { color: #666; line-height: 1.6; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #0088cc;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #006699; }
        .features {
            text-align: left;
            margin-top: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>☀️ Morning Bot</h1>
    <p>Ваш персональный помощник для учета времени пробуждения и дневника питания.</p>
    
    <div class="features">
        <li>✅ Прогноз погоды каждое утро</li>
        <li>✅ Фиксация времени подъема</li>
        <li>✅ Дневник приема пищи</li>
        <li>✅ Графики статистики за месяц</li>
    </div>

    <a href="https://t.me/YourBotUsername" class="btn">Запустить в Telegram</a>
</div>

</body>
</html>
